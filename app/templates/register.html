<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Rice Disease Detector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<!-- Flash Alert Message -->
<div class="flash-message-container position-fixed start-50 translate-middle-x">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} custom-alert shadow fade show text-center" role="alert">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
</div>

<!-- System Name Top Left -->
<div class="top-left-logout">
  <h4 class="fw-bold m-0">
    <a href="{{ url_for('home.index') }}" class="text-decoration-none text-dark">
      Smart Rice Crop Disease Detector
    </a>
  </h4>
</div>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="text-center form-box p-4">
    <h3 class="mb-4 fw-bold">Register</h3>
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">New Username</label>
        <input type="text" name="username" class="form-control form-input" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">New Password</label>
        <input type="password" name="password" class="form-control form-input" required>
      </div>
      <button type="submit" class="btn btn-warning px-4">Register</button>
    </form>
    <div class="mt-3">
      <span>Got an account? <a href="{{ url_for('auth.login') }}">Login here</a></span>
    </div>
  </div>
</div>

<script>
  // Auto-dismiss alert after 3 seconds
  setTimeout(() => {
    document.querySelectorAll('.flash-message-container .alert').forEach(el => {
      el.classList.remove('show');
      el.classList.add('hide');
      setTimeout(() => el.remove(), 500);
    });
  }, 3000);
</script>
</body>

</html>
